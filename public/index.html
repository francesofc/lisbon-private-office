<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lisbon Private Office</title>
  <script>
    (function() {
      var lang = (navigator.language || '').slice(0, 2).toLowerCase();
      var supported = ['en', 'fr', 'pt'];
      var locale = supported.indexOf(lang) !== -1 ? lang : 'en';
      window.location.replace('/' + locale + '/');
    })();
  </script>
  <meta http-equiv="refresh" content="0;url=/en/">
</head>
<body></body>
</html>
